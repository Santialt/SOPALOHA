name: Quality

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            apps/api/package-lock.json
            apps/web/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install API dependencies
        run: npm ci --prefix apps/api

      - name: Install Web dependencies
        run: npm ci --prefix apps/web

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check:phase1

      - name: Tests
        run: npm run test

      - name: Build
        run: npm run build

      - name: Smoke
        run: npm run smoke
